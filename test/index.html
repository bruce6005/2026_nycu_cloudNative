<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lab System</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .topbar {
            height: 60px;
            background-color: #1f1f1f;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .logo {
            font-weight: bold;
            font-size: 18px;
        }

        .login-btn {
            background: white;
            color: black;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
        }

        .container {
            display: flex;
            height: calc(100vh - 60px);
        }

        .sidebar {
            width: 15%;
            background-color: #2c2c2c;
            color: white;
            padding: 20px;
            box-sizing: border-box;
        }

        .menu-item {
            margin-bottom: 15px;
            cursor: pointer;
        }

        .menu-item:hover {
            color: #bbbbbb;
        }

        .content {
            width: 85%;
            padding: 30px;
            box-sizing: border-box;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .form-row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .form-row input {
            flex: 1;
            padding: 10px;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
        }

        .form-row button {
            padding: 10px 16px;
            border: none;
            background-color: #1f1f1f;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }

        .status-text {
            margin-top: 12px;
            color: #555;
            font-size: 14px;
        }

        .order-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .order-item {
            padding: 12px 0;
            border-bottom: 1px solid #ececec;
            display: flex;
            justify-content: space-between;
        }

        .order-tag {
            font-size: 12px;
            padding: 4px 8px;
            background-color: #efefef;
            border-radius: 999px;
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo">LAB SYSTEM</div>
    <button class="login-btn">Login</button>
</div>

<div class="container">
    <div class="sidebar">
        <div class="menu-item">Dashboard</div>
        <div class="menu-item">Orders</div>
        <div class="menu-item">Create Order</div>
        <div class="menu-item">Approval</div>
        <div class="menu-item">Machine Monitor</div>
        <div class="menu-item">Analytics</div>
    </div>

    <div class="content">

        <div class="card">
            <h2>Create Order</h2>

            <div class="form-row">
                <input id="orderName" type="text" placeholder="Input order name">
                <button onclick="createOrder()">Create</button>
            </div>

            <div id="status" class="status-text"></div>
        </div>

        <div class="card">
            <h2>Recent Orders</h2>
            <ul id="orderList" class="order-list"></ul>
        </div>

        <div class="card">
            <h2>Machine Status</h2>
            <p>Machine A - Running</p>
            <p>Machine B - Error</p>
            <p>Machine C - Idle</p>
        </div>

    </div>
    </div>
    <div id="errorModal" style="
        display:none;
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.5);
        justify-content:center;
        align-items:center;
    ">
        <div style="
            background:white;
            padding:20px;
            border-radius:8px;
            width:300px;
            text-align:center;
        ">
            <h3>Backend Error</h3>
            <p id="errorMessage">Server not responding</p>
            <button onclick="closeModal()">OK</button>
        </div>
    </div>

<script type="module">

import { CONFIG } from './config.js';
    async function loadOrders() {
        try {
            const response = await fetch(`${CONFIG.API_BASE}/orders`);

            if (!response.ok) {
                throw new Error();
            }

            const data = await response.json();
            renderOrders(data);

        } catch (error) {
            showError("Cannot load data from backend");
        }
    }

    window.createOrder = async function () {
    const input = document.getElementById("orderName");
    const name = input.value.trim();

    if (!name) {
        showError("Please enter order name");
        return;
    }

    try {
        const response = await fetch(`${CONFIG.API_BASE}/orders/generate`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ name: name })
        });

        const data = await response.json();
        renderOrders(data);

    } catch (e) {
        showError("Backend error");
    }
}

    function renderOrders(orders) {
        const list = document.getElementById('orderList');
        list.innerHTML = '';

        if (!orders || orders.length === 0) {
            list.innerHTML = '<li class="order-item"><span>No orders yet</span></li>';
            return;
        }

        orders.forEach((order, index) => {
            const li = document.createElement('li');
            li.className = 'order-item';
            li.innerHTML = `
                <span>Order #${String(index + 1).padStart(3, '0')} - ${order}</span>
                <span class="order-tag">Pending</span>
            `;
            list.appendChild(li);
        });
    }

    window.onload = loadOrders;

    function showError(message) {
        document.getElementById("errorMessage").innerText = message;
        document.getElementById("errorModal").style.display = "flex";
    }

    window.closeModal = function () {
        document.getElementById("errorModal").style.display = "none";
    }
</script>

</body>
</html>
