spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/lab_system}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}

# Development mode: rebuild tables from the current JPA entities on backend startup.
# This keeps the local schema aligned while the data model is still changing quickly.
# spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create}

spring.jpa.show-sql=true
server.port=${PORT:8080}

# Google OAuth2 Client ID for Token Verification (Support Env Variable)
# google.client.id=${GOOGLE_CLIENT_ID:}
google.client.id=${GOOGLE_CLIENT_ID:918686891468-545ppen19kij93c600ipu7prhnsi04qi.apps.googleusercontent.com}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:*}
app.reset-data-on-startup=${APP_RESET_DATA_ON_STARTUP:true}
